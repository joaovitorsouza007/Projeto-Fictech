<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Projeto_Fictech/estilos/contato.css">
    <title>Contato</title>
</head>

<body>
    <main>
        <a href="/Projeto_Fictech/Index.html"><img src="/Projeto_Fictech/imagens/seta-voltar.png" alt="" class="retornar"></a>
        
        <section>
            <div class="card">
                <form action="" method="post">

                    <div class="inputsIdent">
                        <h2>Inscreva-se em nosso processo seletivo:</h2>
                        <p>Cadastre-se e faça parte de nossa equipe.</p>
                        <div class="container">
                            <label for="name">Nome:</label>
                            <input type="text" name="name" id="name">
                        </div>
                        <div class="container">
                            <label for="phone">Telefone:</label>
                            <input type="tel" name="phone" id="phone">
                        </div>
                        <div class="container">
                            <label for="email">Email:</label>
                            <input type="email" name="email" id="email">
                        </div>
                        <div class="container">
                            <label for="city">Cidade:</label>
                            <input type="text" name="city" id="city">
                        </div>
                    </div>


                    <div class="inputsConhecimentos">
                        <label for="experiencia">Selecione sua expêriencia</label>
                        <select name="" id="experiencia">
                            <option value="" disabled selected>Escolha aqui...</option>
                            <option value="sem-experiencia">Sem expêriencia</option>
                            <option value="informal">Trabalhou informal</option>
                            <option value="clt">CLT</option>
                        </select>
                        <label for="escolaridade">Escolaridade</label>
                        <select name="" id="escolaridade">
                            <option value="" disabled selected>Escolha aqui...</option>
                            <option value="ensino-medio-inc">Ensino médio Incompleto</option>
                            <option value="ensino-medio-completo">Ensino médio Completo</option>
                            <option value="superior-inc">Ensino Superior Incompleto</option>
                            <option value="superior-completo">Ensino Superior Completo</option>
                            <option value="pos">Pós-graduação</option>
                        </select>
                    </div>


                    <div class="inputsIdiomas">
                        <legend>Escolha os idiomas com domínio intermediário: </legend>
                        <div class="container">
                            <label for="ingles">Inglês</label>
                            <input type="checkbox" name="idioma" id="ingles">
                        </div>
                        <div class="container">
                            <label for="espanhol">Espanhol</label>
                            <input type="checkbox" name="idioma" id="espanhol">
                        </div>
                        <div class="container">
                            <label for="frances">Francês</label>
                            <input type="checkbox" name="idioma" id="frances">
                        </div>
                        <div class="container">

                            <label for="italiano">Italiano</label>
                            <input type="checkbox" name="idioma" id="italiano">
                        </div>
                        <div class="container">
                            <label for="outro">Outro</label>
                            <input type="checkbox" name="idioma" id="outro">
                        </div>
                    </div>

                    <div class="inputMsg">
                        <label for="msg">Escreva sobre você (fale sobre suas expêriencias e diferenciais).</label>
                        <textarea name="msg" id="msg" placeholder="Digite aqui..."></textarea>
                        <input type="submit" value="Enviar" class="button">
                    </div>


                </form>
            </div>

        </section>




    </main>
</body>

</html>
